name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README*.md'
      - 'CHANGELOG.md'
      - 'NOTICE'
      - 'LICENSE-*'
      - '**.txt'
  pull_request:
    paths-ignore:
      - 'README*.md'
      - 'CHANGELOG.md'
      - 'NOTICE'
      - 'LICENSE-*'
      - '**.txt'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rustfmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup update stable && rustup default stable && rustup component add rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: clippy
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup update stable && rustup default stable && rustup component add clippy
      - name: Apply clippy lints
        # Note: ort downloads/compiles onnxruntime as part of the build,
        # which can be slow on a fresh runner. Allow up to 30 min.
        timeout-minutes: 30
        run: cargo clippy --all-targets --features full -- -D warnings

  test:
    name: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup update stable && rustup default stable
      - name: Run tests (default features)
        timeout-minutes: 30
        run: cargo test --release --lib
      - name: Run tests (with wav + resample)
        timeout-minutes: 30
        run: cargo test --release --features full --lib
      # Integration tests intentionally skip when fixture audio is
      # missing (most CI runners do not have the required WAV files
      # checked in). The bundled ONNX model is enough to run the
      # smoke tests that don't need real audio.
      - name: Run integration tests (smoke)
        timeout-minutes: 30
        run: cargo test --release --test integration_test
